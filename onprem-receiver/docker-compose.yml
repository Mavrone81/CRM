services:
  receiver:
    build: .
    container_name: wa-receiver
    restart: unless-stopped
    stdin_open: true          # keep a TTY so the QR renders on first link
    tty: true
    environment:
      CRM_INGEST_URL: ${CRM_INGEST_URL:-https://crm.urbanwerkzsg.com/api/proxy/ingest}
      INGEST_TOKEN: ${INGEST_TOKEN:?set INGEST_TOKEN in .env (must match the CRM server)}
      NUMBER_ID: ${NUMBER_ID:-onprem-n2}
    volumes:
      - ./session:/app/session   # persists the device link across restarts
