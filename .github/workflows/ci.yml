name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  server:
    name: Server tests (unit + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: node --check index.js
      - name: Unit + integration tests
        run: NODE_ENV=test node --test test/unit/*.test.js test/integration/*.test.js

  web-build:
    name: Web build (mirrors deploy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (next build — same as the Docker deploy)
        run: npm run build

  e2e:
    name: E2E (Playwright, full UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json
            e2e/package-lock.json
      - name: Install deps (server, web, e2e)
        run: |
          npm --prefix server ci
          npm --prefix web ci
          npm --prefix e2e ci
      - name: Build web
        run: npm --prefix web run build
      - name: Install Playwright browser
        run: npm --prefix e2e exec -- playwright install --with-deps chromium
      - name: Run e2e
        run: npm --prefix e2e test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
